name: Distribute

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes shown to testers'
        required: false
        default: 'New build available'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FLUTTER_VERSION: '3.44.1'

jobs:
  # ─────────────────────────────────────────────
  # Check which secrets are configured
  # ─────────────────────────────────────────────
  setup:
    name: Check secrets
    runs-on: ubuntu-latest
    outputs:
      has_android: ${{ steps.check.outputs.has_android }}
    steps:
      - name: Detect available secrets
        id: check
        env:
          ANDROID_KEY: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEY" ]; then
            echo "has_android=true" >> $GITHUB_OUTPUT
          else
            echo "has_android=false" >> $GITHUB_OUTPUT
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — Android job will be skipped"
          fi

  # ─────────────────────────────────────────────
  # Android — builds dev + prod, distributes prod
  # ─────────────────────────────────────────────
  android:
    name: Build & Distribute Android
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.has_android == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/keystore.jks

      - name: Build dev APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk \
            --flavor dev \
            --target lib/main_dev.dart \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --release

      - name: Build prod APK
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk \
            --flavor prod \
            --target lib/main_prod.dart \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --release

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: apks
          path: |
            build/app/outputs/flutter-apk/app-dev-release.apk
            build/app/outputs/flutter-apk/app-prod-release.apk

      - name: Distribute prod to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ secrets.FIREBASE_TESTER_GROUPS }}
          file: build/app/outputs/flutter-apk/app-prod-release.apk
          releaseNotes: ${{ github.event.inputs.release_notes || 'New build available' }}
