name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build dev APK
        run: |
          flutter build apk \
            --flavor dev \
            --target lib/main_dev.dart \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_DEV }} \
            --release
          mv build/app/outputs/flutter-apk/app-dev-release.apk \
             build/app/outputs/flutter-apk/chaty-agent-dev-${{ github.ref_name }}.apk

      - name: Build prod APK
        run: |
          flutter build apk \
            --flavor prod \
            --target lib/main_prod.dart \
            --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY_PROD }} \
            --release
          mv build/app/outputs/flutter-apk/app-prod-release.apk \
             build/app/outputs/flutter-apk/chaty-agent-prod-${{ github.ref_name }}.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk

  release:
    name: Create GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: android-apks
          path: artifacts/android

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-dev') }}
          files: artifacts/android/*.apk

  notify:
    name: Send Email Notification
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Send Gmail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Chaty Agent ${{ github.ref_name }} — Build Ready"
          to: devmostafasoliman@gmail.com
          from: Chaty Agent CI <${{ secrets.GMAIL_USERNAME }}>
          body: |
            New build released: ${{ github.ref_name }}

            Download from GitHub Releases:
            https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}

            Artifacts:
            - chaty-agent-dev-${{ github.ref_name }}.apk
            - chaty-agent-prod-${{ github.ref_name }}.apk
